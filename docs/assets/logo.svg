<svg width="820" height="220" viewBox="0 0 820 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Rollcall — presence for wheels">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="820" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0e1524"/>
      <stop offset="0.55" stop-color="#141d33"/>
      <stop offset="1" stop-color="#1b2540"/>
    </linearGradient>
    <linearGradient id="accent" x1="120" y1="40" x2="200" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5eead4"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="word" x1="300" y1="60" x2="760" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#cbd5e1"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#5eead4" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#5eead4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Card -->
  <rect x="1" y="1" width="818" height="218" rx="26" fill="url(#bg)" stroke="#2a3550" stroke-width="2"/>

  <!-- Beacon glow behind the wheel -->
  <circle cx="160" cy="110" r="95" fill="url(#glow)"/>

  <!-- Presence signal arcs radiating from the wheel -->
  <g stroke="url(#accent)" stroke-linecap="round" fill="none" opacity="0.9">
    <path d="M226 74 a58 58 0 0 1 0 72" stroke-width="6" opacity="0.9"/>
    <path d="M244 56 a84 84 0 0 1 0 108" stroke-width="5" opacity="0.55"/>
    <path d="M262 40 a110 110 0 0 1 0 140" stroke-width="4" opacity="0.28"/>
  </g>

  <!-- Wheel: tire + hub, Onewheel-flavored -->
  <g>
    <circle cx="160" cy="110" r="60" fill="#0b1120" stroke="url(#accent)" stroke-width="9"/>
    <circle cx="160" cy="110" r="34" fill="#0b1120" stroke="#334155" stroke-width="3"/>
    <!-- hub bolt -->
    <circle cx="160" cy="110" r="9" fill="url(#accent)"/>
    <!-- motion notches on the tire -->
    <g stroke="#5eead4" stroke-width="5" stroke-linecap="round" opacity="0.85">
      <line x1="160" y1="56" x2="160" y2="68"/>
      <line x1="214" y1="110" x2="202" y2="110"/>
      <line x1="160" y1="164" x2="160" y2="152"/>
      <line x1="106" y1="110" x2="118" y2="110"/>
    </g>
  </g>

  <!-- Wordmark -->
  <text x="300" y="120" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="82" font-weight="800" letter-spacing="-2" fill="url(#word)">rollcall</text>

  <!-- Tagline -->
  <text x="303" y="158" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="24" font-weight="500" letter-spacing="4" fill="#5eead4">PRESENCE&#160;&#160;FOR&#160;&#160;WHEELS</text>
</svg>
